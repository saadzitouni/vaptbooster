# =============================================================
# VAPTBOOSTER — PRODUCTION stack.
#
#   cp .env.production.example .env.production   # fill in real secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Secrets are fail-closed (${VAR:?...}) — the stack refuses to start if a
# required secret is unset. Only Caddy publishes host ports (80/443); every
# other service is internal-only. The app connects as the low-privilege
# vaptbooster_app role so Postgres RLS is enforced.
# =============================================================

services:
  # ---- Postgres (internal) ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vaptbooster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_MULTIPLE_DATABASES: vaptbooster,litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-vaptbooster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Redis (internal) ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- LiteLLM gateway (internal) ----
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-vaptbooster}:${POSTGRES_PASSWORD}@postgres:5432/litellm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # config.yaml routes all models via OpenRouter — this is the active provider.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required (config.yaml routes via OpenRouter)}
      # Optional — only needed if you point config.yaml back at anthropic/openai direct.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000 --num_workers 1
    healthcheck:
      # The litellm image has no curl/wget — use python (it IS a python app) to
      # probe the lightweight liveliness endpoint. readiness can 503 mid-boot.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=4)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ---- One-shot DB bootstrap: migrations + low-priv role (+ optional seed) ----
  db-init:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      # Owner connection — migrations + role creation need superuser.
      DATABASE_URL: postgresql://${POSTGRES_USER:-vaptbooster}:${POSTGRES_PASSWORD}@postgres:5432/vaptbooster
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
      SEED_ON_INIT: ${SEED_ON_INIT:-false}

  # ---- Next.js web (internal; exposed via Caddy) ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      # Bind the standalone server to all interfaces. Docker auto-sets HOSTNAME
      # to the container id, which Next would otherwise bind to — making the app
      # unreachable on localhost (healthcheck gets "connection refused").
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Low-privilege app role → RLS enforced.
      DATABASE_URL: postgresql://vaptbooster_app:${APP_DB_PASSWORD}@postgres:5432/vaptbooster
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      # For the operator "Provision key" button → calls the LiteLLM admin API.
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_TRUST_HOST: "true"
      # Override in .env when serving over plain HTTP (e.g. NEXTAUTH_URL=http://<ip>:8080)
      # so NextAuth uses the right base URL + non-secure cookies (login works over http).
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://${ROOT_DOMAIN:?ROOT_DOMAIN is required}}
      APP_URL: ${APP_URL:-https://${ROOT_DOMAIN}}
      ROOT_DOMAIN: ${ROOT_DOMAIN}
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      # 127.0.0.1 (not localhost): the app binds IPv4 0.0.0.0, but Alpine
      # resolves localhost to IPv6 ::1 first → the check would falsely fail.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Scan worker (internal) ----
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      litellm: { condition: service_healthy }
    environment:
      NODE_ENV: production
      # Cross-tenant system service — owner connection (bypasses RLS by design).
      DATABASE_URL: postgresql://${POSTGRES_USER:-vaptbooster}:${POSTGRES_PASSWORD}@postgres:5432/vaptbooster
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Set to false once per-tenant virtual keys are provisioned + mounted.
      SIMULATE_LLM: ${SIMULATE_LLM:-true}
      LITELLM_KEYS_FILE: /secrets/litellm-keys.json
      # Scan engine: "deterministic" (recon→passive→active pipeline, default) or
      # "autonomous" (LLM agent drives the egress-locked sandbox via the DB skill
      # catalog). Autonomous needs SIMULATE_LLM=false, the sandbox image built on
      # this host, and the Docker socket mounted below.
      AGENT_MODE: ${AGENT_MODE:-deterministic}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-vaptbooster-agent-sandbox:latest}
    volumes:
      - ./.secrets:/secrets:ro
      # Autonomous mode launches sibling sandbox containers on the host. This
      # grants the worker host-Docker control (root-equivalent) — only needed
      # for AGENT_MODE=autonomous. Safe to leave mounted; unused otherwise.
      - /var/run/docker.sock:/var/run/docker.sock

  # ---- Caddy reverse proxy (TLS + tenant subdomains) — the only public entry ----
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web: { condition: service_healthy }
    ports:
      # HTTP-only on 8080 (avoids the host's port-80 conflict). No TLS — see
      # the Caddyfile note; use 80/443 for production HTTPS.
      - "8080:8080"
    environment:
      ROOT_DOMAIN: ${ROOT_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-admin@${ROOT_DOMAIN}}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
