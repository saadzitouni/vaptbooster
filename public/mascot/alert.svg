  <defs>
    <style>
    .rig { animation: shake 0.5s ease-in-out infinite; transform-origin: center; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-3.0px) rotate(-2deg); }
      40% { transform: translateX(3.0px) rotate(2deg); }
      60% { transform: translateX(-2.4000000000000004px) rotate(-1deg); }
      80% { transform: translateX(2.4000000000000004px) rotate(1deg); }
    }
    .eye-alert { animation: flash 0.5s steps(1) infinite; }
    @keyframes flash { 0%,100% { fill: #B4231C; } 50% { fill: #EDEDED; } }
    .ant { animation: antflash 0.5s steps(1) infinite; }
    @keyframes antflash { 0%,100% { fill: #B4231C; } 50% { fill: #EDEDED; } }
    </style>

